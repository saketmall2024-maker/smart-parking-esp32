<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking Counter (Center Logic)</title>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
video, canvas {
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit:cover;
}
#ui {
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video> <canvas id="canvas"></canvas>

<div id="ui">
  <h2>IN: <span id="in">0</span></h2>
  <h2>OUT: <span id="out">0</span></h2>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const inText = document.getElementById("in");
const outText = document.getElementById("out");

// SETTINGS
const MAX_SLOTS = 5;
const DIFF_THRESHOLD = 70;
const MOTION_THRESHOLD = 4000;

// STATE
let prevFrame = null;
let inCount = 0;
let outCount = 0;

let lastZone = null;
let passedCenter = false;
let cooldown = 0;

// Camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

video.addEventListener("loadeddata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  requestAnimationFrame(track);
});

function updateUI(){
  inText.innerText = inCount;
  outText.innerText = outCount;
}

function track(){
  ctx.drawImage(video, 0, 0);

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  let left = 0, center = 0, right = 0;
  let totalMotion = 0;

  if(prevFrame){
    const prev = prevFrame.data;

    for(let i = 0; i < data.length; i += 4){
      let diff =
        Math.abs(data[i] - prev[i]) +
        Math.abs(data[i+1] - prev[i+1]) +
        Math.abs(data[i+2] - prev[i+2]);

      if(diff > DIFF_THRESHOLD){
        totalMotion++;

        let x = (i / 4) % canvas.width;

        if(x < canvas.width/3) left++;
        else if(x < 2*canvas.width/3) center++;
        else right++;
      }
    }

    if(totalMotion > MOTION_THRESHOLD){

      let currentZone = null;

      if(center > left && center > right) currentZone = "CENTER";
      else if(left > right) currentZone = "LEFT";
      else currentZone = "RIGHT";

      // Step 1: detect passing through center
      if(currentZone === "CENTER"){
        passedCenter = true;
      }

      // Step 2: detect direction AFTER center
      if(passedCenter && cooldown <= 0){

        // CENTER → RIGHT = IN
        if(currentZone === "RIGHT"){
          if((inCount - outCount) < MAX_SLOTS){
            inCount++;
            updateUI();
          }
          resetState();
        }

        // CENTER → LEFT = OUT
        else if(currentZone === "LEFT"){
          if(inCount > outCount){
            outCount++;
            updateUI();
          }
          resetState();
        }
      }

      lastZone = currentZone;

    } else {
      // reset when no motion
      resetState();
    }

    if(cooldown > 0) cooldown--;
  }

  prevFrame = frame;
  requestAnimationFrame(track);
}

// Reset tracking after one object
function resetState(){
  passedCenter = false;
  lastZone = null;
  cooldown = 15;
}
</script>

</body>
</html>
