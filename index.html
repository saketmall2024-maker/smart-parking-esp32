<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Counter (2 Sensor Logic)</title>

<style>
body { margin:0; overflow:hidden; background:black; color:white; }
video, canvas {
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit:cover;
}
#ui {
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  font-family:Arial;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video> <canvas id="canvas"></canvas>

<div id="ui">
  <h2>IN: <span id="in">0</span></h2>
  <h2>OUT: <span id="out">0</span></h2>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const inText = document.getElementById("in");
const outText = document.getElementById("out");

let prevFrame = null;

let inCount = 0;
let outCount = 0;
const MAX = 5;

// sensor states
let leftActive = false;
let rightActive = false;
let lastTrigger = null;
let cooldown = 0;

const DIFF_THRESHOLD = 60;
const MIN_PIXELS = 1500;

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

video.addEventListener("loadeddata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  requestAnimationFrame(loop);
});

function updateUI(){
  inText.innerText = inCount;
  outText.innerText = outCount;
}

function loop(){
  ctx.drawImage(video, 0, 0);

  const frame = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = frame.data;

  let left = 0;
  let right = 0;

  if(prevFrame){
    const prev = prevFrame.data;

    for(let i=0;i<data.length;i+=4){
      let diff =
        Math.abs(data[i]-prev[i]) +
        Math.abs(data[i+1]-prev[i+1]) +
        Math.abs(data[i+2]-prev[i+2]);

      if(diff > DIFF_THRESHOLD){
        let x = (i/4) % canvas.width;

        if(x < canvas.width/3) left++;
        else if(x > 2*canvas.width/3) right++;
      }
    }

    // detect triggers
    if(left > MIN_PIXELS){
      if(!leftActive){
        leftActive = true;

        if(lastTrigger === "RIGHT" && cooldown <= 0){
          // RIGHT → LEFT = OUT
          if(inCount > outCount){
            outCount++;
            updateUI();
          }
          cooldown = 20;
          lastTrigger = null;
        } else {
          lastTrigger = "LEFT";
        }
      }
    } else {
      leftActive = false;
    }

    if(right > MIN_PIXELS){
      if(!rightActive){
        rightActive = true;

        if(lastTrigger === "LEFT" && cooldown <= 0){
          // LEFT → RIGHT = IN
          if((inCount - outCount) < MAX){
            inCount++;
            updateUI();
          }
          cooldown = 20;
          lastTrigger = null;
        } else {
          lastTrigger = "RIGHT";
        }
      }
    } else {
      rightActive = false;
    }

    if(cooldown > 0) cooldown--;
  }

  prevFrame = frame;
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
